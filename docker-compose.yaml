x-airflow-common:
  &airflow-common
  # In order to add custom dependencies or upgrade provider packages you can use your extended image.
  # Comment the image line, place your Dockerfile in the directory where you placed the docker-compose.yaml
  # and uncomment the "build" line below, Then run `docker-compose build` to build the images.
  # image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.6.0}
  build: .
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
    # For backward compatibility, with Airflow <2.3
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES:-False}
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-plengo_airflow_secret_key}
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    # DAG sync speed
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: '30'         # rescan dags/ every 30s (was 10s — reduces CPU pressure)
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: '30'    # re-parse changed files every 30s (was 5s)
    AIRFLOW__SCHEDULER__SCHEDULER_HEARTBEAT_SEC: '10'      # heartbeat every 10s (was 5s — gives more breathing room)
    AIRFLOW__SCHEDULER__PARSING_PROCESSES: '1'             # only 1 DAG file parser (saves CPU on single-machine setups)
    AIRFLOW__WEBSERVER__WARN_DEPLOYMENT_EXPOSURE: 'False'
    # Raise the stale heartbeat threshold so the UI warning only shows if truly dead (default 30s)
    AIRFLOW__SCHEDULER__SCHEDULER_HEALTH_CHECK_THRESHOLD: '60'
    # Spark JDBC drivers — pre-downloaded into /opt/airflow/jars/ by the Dockerfile.
    # SPARK_CLASSPATH is read by PySpark before the JVM starts, so the drivers are
    # available to ALL Spark DAGs without any per-DAG spark.jars config.
    SPARK_CLASSPATH: "/opt/airflow/jars/postgresql-42.7.3.jar:/opt/airflow/jars/mysql-connector-j-8.4.0.jar:/opt/airflow/jars/mssql-jdbc-12.6.1.jre11.jar"
    PYSPARK_SUBMIT_ARGS: "--jars /opt/airflow/jars/postgresql-42.7.3.jar,/opt/airflow/jars/mysql-connector-j-8.4.0.jar,/opt/airflow/jars/mssql-jdbc-12.6.1.jre11.jar pyspark-shell"
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/data_dumps:/opt/airflow/data_dump:rw
  user: "${AIRFLOW_UID:-50000}"
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy
services:
  postgres:
    image: postgres:13
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: airflow
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
      - ./postgres-allow-remote.sh:/docker-entrypoint-initdb.d/postgres-allow-remote.sh

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  redis:
    image: redis:latest
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 30s
      retries: 50
    restart: always

  airflow-webserver:
    <<: *airflow-common
    env_file:
      - .env
    command: webserver
    ports:
      - 8090:8080
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5

    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    env_file:
      - .env
    expose:
      - 8888
      - 8889
    ports:
      - 8889:8888
    build: .
    command: scheduler
    healthcheck:
      # hostname-agnostic check — avoids false alarms when $HOSTNAME resolves inconsistently
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --allow-multiple"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 60s
    restart: always

    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    env_file:
      - .env
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 10s
      timeout: 10s
      retries: 5
    environment:
      <<: *airflow-common-env
      # Required to handle warm shutdown of the celery workers properly
      # See https://airflow.apache.org/docs/docker-stack/entrypoint.html#signal-propagation
      DUMB_INIT_SETSID: "0"
    restart: always

    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    env_file:
      - .env
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    # yamllint disable rule:line-length
    command:
      - -c
      - |
        function ver() {
          printf "%04d%04d%04d%04d" $${1//./ }
        }
        airflow_version=$$(AIRFLOW__LOGGING__LOGGING_LEVEL=INFO && gosu airflow airflow version)
        airflow_version_comparable=$$(ver $${airflow_version})
        min_airflow_version=2.2.0
        min_airflow_version_comparable=$$(ver $${min_airflow_version})
        if (( airflow_version_comparable < min_airflow_version_comparable )); then
          echo
          echo -e "\033[1;31mERROR!!!: Too old Airflow version $${airflow_version}!\e[0m"
          echo "The minimum Airflow version supported: $${min_airflow_version}. Only use this or higher!"
          echo
          exit 1
        fi
        if [[ -z "${AIRFLOW_UID:-50000}" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: AIRFLOW_UID not set!\e[0m"
          echo "If you are on Linux, you SHOULD follow the instructions below to set "
          echo "AIRFLOW_UID environment variable, otherwise files will be owned by root."
          echo "For other operating systems you can get rid of the warning with manually created .env file:"
          echo "    See: https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#setting-the-right-airflow-user"
          echo
        fi
        one_meg=1048576
        mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
        cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
        disk_available=$$(df / | tail -1 | awk '{print $$4}')
        warning_resources="false"
        if (( mem_available < 4000 )) ; then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough memory available for Docker.\e[0m"
          echo "At least 4GB of memory required. You have $$(numfmt --to iec $$((mem_available * one_meg)))"
          echo
          warning_resources="true"
        fi
        if (( cpus_available < 2 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough CPUS available for Docker.\e[0m"
          echo "At least 2 CPUs recommended. You have $${cpus_available}"
          echo
          warning_resources="true"
        fi
        if (( disk_available < one_meg * 10 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough Disk space available for Docker.\e[0m"
          echo "At least 10 GBs recommended. You have $$(numfmt --to iec $$((disk_available * 1024 )))"
          echo
          warning_resources="true"
        fi
        if [[ $${warning_resources} == "true" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: You have not enough resources to run Airflow (see above)!\e[0m"
          echo "Please follow the instructions to increase amount of resources available:"
          echo "   https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#before-you-begin"
          echo
        fi
        mkdir -p /sources/logs /sources/dags /sources/plugins
        chown -R "${AIRFLOW_UID:-50000}:0" /sources/{logs,dags,plugins}
        exec /entrypoint airflow version
        exec /entrypoint airflow db init
    # yamllint enable rule:line-length
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}:/sources


  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"

  web-ui:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}:/app
    environment:
      FLASK_APP: web_ui/app.py
      FLASK_ENV: development
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-plengo_webui_secret_key}
      WEBUI_ADMIN_USER: ${WEBUI_ADMIN_USER:-admin}
      WEBUI_ADMIN_PASS: ${WEBUI_ADMIN_PASS:-admin123}
      WEBUI_DB: /app/web_ui/webui.db
      CONFIG_DIR: /app/dags/config
      ETL_DIR: /app/dags/etl
      TEMPLATE_PATH: /app/dags/templates/data_load.template
      SQL_DIR: /app/dags/sql
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:-postgresql+psycopg2://airflow:airflow@postgres/airflow}
      AIRFLOW_VAR_environment: ${AIRFLOW_VAR_ENVIRONMENT:-dev}
    ports:
      - "5001:5001"
    depends_on:
      - postgres
    command: >
      sh -c "pip install --no-cache-dir -r web_ui/requirements.txt && python -m flask run --host 0.0.0.0 --port 5001"



  # You can enable flower by adding "--profile flower" option e.g. docker-compose --profile flower up
  # or by explicitly targeted on the command line e.g. docker-compose up flower.
  # See: https://docs.docker.com/compose/profiles/
  flower:
    <<: *airflow-common
    command: celery flower
    profiles:
      - flower
    ports:
      - 5555:5555
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  pipeline-monitor:
    build:
      context: ./data_pipeline_monitor
    ports:
      - "8050:8050"
    environment:
      # Target DB — where pipeline.etl_metrics lives (cenfri_prd_con / RDS)
      # Uses METRICS_DB_* names to avoid collision with POSTGRES_DATA_* (data lake) shell vars
      DB_USER: ${METRICS_DB_USER:-cenfri_db_admin}
      DB_PASS: ${METRICS_DB_PASS:-y5j9p4aijrU2V6B9}
      DB_HOST: ${METRICS_DB_HOST:-cenfri-aws.cxc8802a0cus.af-south-1.rds.amazonaws.com}
      DB_PORT: ${METRICS_DB_PORT:-5432}
      DB_NAME: ${METRICS_DB_NAME:-cenfri_prod}
    volumes:
      - ./data_pipeline_monitor/data:/app/data
      - ./data_pipeline_monitor/dashboard.py:/app/dashboard.py
    depends_on:
      - postgres
    restart: always

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    ports:
      - "9090:8080"     # Jenkins Web UI
      - "50000:50000"   # Jenkins agent port
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock  # lets Jenkins run docker commands on host
    restart: always

volumes:
  postgres-db-volume:
  postgres:
  pgadmin:
  jenkins_home: