<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Login — ETL Manager</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
<div class="app-shell">
  <div class="login-wrap">
    <div class="login-card">
      <div class="navbar-brand" style="font-size:18px;margin-bottom:24px;display:block;text-align:center;color:#1e3a5f;">
        &#9654; ETL Manager
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert {% if cat == 'error' %}alert-error{% endif %}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="post" action="{{ url_for('login') }}">
        <div class="form-field" style="margin-bottom:12px;">
          <label>Username</label>
          <input name="username" autofocus placeholder="Username" required />
        </div>
        <div class="form-field" style="margin-bottom:20px;">
          <label>Password</label>
          <input type="password" name="password" placeholder="Password" required />
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%;">Sign In</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
